<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#e88c30",
                        "background-light": "#f8f7f6",
                        "background-dark": "#211911",
                    },
                    fontFamily: {
                        "display": ["Plus Jakarta Sans"]
                    },
                    borderRadius: {"DEFAULT": "0.5rem", "lg": "1rem", "xl": "1.5rem", "full": "9999px"},
                },
            },
        }
    </script>
<title>CaféLog - Record Visit</title>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 antialiased">
<div class="relative flex h-auto min-h-screen w-full max-w-md mx-auto flex-col bg-background-light dark:bg-background-dark overflow-x-hidden">
<div class="flex items-center p-4 pb-2 justify-between sticky top-0 bg-background-light/80 dark:bg-background-dark/80 backdrop-blur-md z-10">
<div class="text-slate-900 dark:text-slate-100 flex size-12 shrink-0 items-center cursor-pointer">
<span class="material-symbols-outlined text-2xl">close</span>
</div>
<h2 class="text-slate-900 dark:text-slate-100 text-lg font-bold leading-tight tracking-tight flex-1 text-center pr-12">Record Visit</h2>
</div>
<div class="px-4 py-3">
<label class="flex flex-col min-w-40 h-12 w-full">
<div class="flex w-full flex-1 items-stretch rounded-xl h-full shadow-sm">
<div class="text-primary flex border-none bg-white dark:bg-slate-800 items-center justify-center pl-4 rounded-l-xl">
<span class="material-symbols-outlined text-xl">search</span>
</div>
<input class="form-input flex w-full min-w-0 flex-1 resize-none overflow-hidden rounded-xl text-slate-900 dark:text-slate-100 focus:outline-0 focus:ring-2 focus:ring-primary/50 border-none bg-white dark:bg-slate-800 h-full placeholder:text-slate-400 px-4 rounded-l-none pl-2 text-base font-normal" placeholder="Search Café Name..." value=""/>
</div>
</label>
</div>
<div class="px-4 pt-4">
<div class="flex items-center justify-between pb-3">
<h3 class="text-slate-900 dark:text-slate-100 text-lg font-bold leading-tight">Add Photos</h3>
<span class="text-sm text-primary font-medium">0 / 4</span>
</div>
<div class="grid grid-cols-2 gap-3">
<div class="flex flex-col gap-3">
<div class="w-full bg-slate-200 dark:bg-slate-700 aspect-square rounded-xl flex items-center justify-center border-2 border-dashed border-slate-300 dark:border-slate-600 cursor-pointer hover:bg-slate-100 transition-colors" data-alt="Placeholder for user coffee photo upload">
<span class="material-symbols-outlined text-slate-400 text-3xl">add_a_photo</span>
</div>
</div>
<div class="flex flex-col gap-3">
<div class="w-full bg-slate-200 dark:bg-slate-700 aspect-square rounded-xl flex items-center justify-center border-2 border-dashed border-slate-300 dark:border-slate-600" data-alt="Empty photo slot">
</div>
</div>
<div class="flex flex-col gap-3">
<div class="w-full bg-slate-200 dark:bg-slate-700 aspect-square rounded-xl flex items-center justify-center border-2 border-dashed border-slate-300 dark:border-slate-600" data-alt="Empty photo slot">
</div>
</div>
<div class="flex flex-col gap-3">
<div class="w-full bg-slate-200 dark:bg-slate-700 aspect-square rounded-xl flex items-center justify-center border-2 border-dashed border-slate-300 dark:border-slate-600" data-alt="Empty photo slot">
</div>
</div>
</div>
</div>
<div class="px-4 pt-6">
<h3 class="text-slate-900 dark:text-slate-100 text-lg font-bold leading-tight pb-3">Drink Type</h3>
<div class="flex flex-wrap gap-2">
<button class="px-4 py-2 rounded-full bg-primary text-white text-sm font-medium">Espresso</button>
<button class="px-4 py-2 rounded-full bg-white dark:bg-slate-800 text-slate-600 dark:text-slate-300 text-sm font-medium border border-slate-200 dark:border-slate-700">Latte</button>
<button class="px-4 py-2 rounded-full bg-white dark:bg-slate-800 text-slate-600 dark:text-slate-300 text-sm font-medium border border-slate-200 dark:border-slate-700">Signature</button>
<button class="px-4 py-2 rounded-full bg-white dark:bg-slate-800 text-slate-600 dark:text-slate-300 text-sm font-medium border border-slate-200 dark:border-slate-700">Non-coffee</button>
<button class="px-4 py-2 rounded-full bg-white dark:bg-slate-800 text-slate-600 dark:text-slate-300 text-sm font-medium border border-slate-200 dark:border-slate-700">Dessert</button>
</div>
</div>
<div class="px-4 pt-6">
<h3 class="text-slate-900 dark:text-slate-100 text-lg font-bold leading-tight pb-3">Mood &amp; Tags</h3>
<div class="flex flex-wrap gap-2">
<button class="px-3 py-1.5 rounded-lg bg-primary/10 dark:bg-primary/20 text-primary text-xs font-semibold border border-primary/20">#Work-friendly</button>
<button class="px-3 py-1.5 rounded-lg bg-white dark:bg-slate-800 text-slate-600 dark:text-slate-300 text-xs font-medium border border-slate-200 dark:border-slate-700">#Date spot</button>
<button class="px-3 py-1.5 rounded-lg bg-white dark:bg-slate-800 text-slate-600 dark:text-slate-300 text-xs font-medium border border-slate-200 dark:border-slate-700">#Solo</button>
<button class="px-3 py-1.5 rounded-lg bg-white dark:bg-slate-800 text-slate-600 dark:text-slate-300 text-xs font-medium border border-slate-200 dark:border-slate-700">#Hanok</button>
<button class="px-3 py-1.5 rounded-lg bg-white dark:bg-slate-800 text-slate-600 dark:text-slate-300 text-xs font-medium border border-slate-200 dark:border-slate-700">#Rooftop</button>
<button class="px-3 py-1.5 rounded-lg bg-white dark:bg-slate-800 text-slate-600 dark:text-slate-300 text-xs font-medium border border-slate-200 dark:border-slate-700">#Pet-friendly</button>
</div>
</div>
<div class="px-4 pt-6">
<h3 class="text-slate-900 dark:text-slate-100 text-lg font-bold leading-tight pb-3">Visit Date</h3>
<div class="flex items-center justify-between p-4 bg-white dark:bg-slate-800 rounded-xl border border-slate-100 dark:border-slate-700 shadow-sm">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-primary">calendar_today</span>
<span class="text-slate-900 dark:text-slate-100 font-medium">October 24, 2023</span>
</div>
<span class="material-symbols-outlined text-slate-400 text-xl cursor-pointer">edit</span>
</div>
</div>
<div class="px-4 pt-6">
<h3 class="text-slate-900 dark:text-slate-100 text-lg font-bold leading-tight pb-3">Memo</h3>
<textarea class="form-textarea w-full rounded-xl border-none bg-white dark:bg-slate-800 p-4 text-slate-900 dark:text-slate-100 placeholder:text-slate-400 focus:ring-2 focus:ring-primary/50 h-32 text-base" placeholder="How was the coffee? Share your thoughts..."></textarea>
</div>
<div class="px-4 pt-6 flex items-center justify-between">
<div class="flex flex-col">
<span class="text-slate-900 dark:text-slate-100 font-bold">Privacy Settings</span>
<span class="text-slate-500 text-xs">Public logs can be seen by everyone</span>
</div>
<label class="relative inline-flex items-center cursor-pointer">
<input checked="" class="sr-only peer" type="checkbox" value=""/>
<div class="w-11 h-6 bg-slate-200 peer-focus:outline-none rounded-full peer dark:bg-slate-700 peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all dark:border-gray-600 peer-checked:bg-primary"></div>
<span class="ml-3 text-sm font-medium text-slate-900 dark:text-slate-100">Public</span>
</label>
</div>
<div class="p-4 mt-8 pb-10">
<button class="w-full bg-primary hover:bg-primary/90 text-white font-bold py-4 rounded-xl shadow-lg shadow-primary/20 transition-all flex items-center justify-center gap-2">
<span class="material-symbols-outlined">send</span>
                Post to Log
            </button>
</div>
</div>
</body></html>
