<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#e88c30",
                        "background-light": "#f8f7f6",
                        "background-dark": "#211911",
                    },
                    fontFamily: {
                        "display": ["Plus Jakarta Sans"]
                    },
                    borderRadius: {"DEFAULT": "0.5rem", "lg": "1rem", "xl": "1.5rem", "full": "9999px"},
                },
            },
        }
    </script>
<title>CaféLog - Map View</title>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
</head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 overflow-hidden">
<div class="relative flex h-screen w-full flex-col overflow-hidden">
<!-- Full-screen Map Background -->
<div class="absolute inset-0 z-0 bg-slate-200 dark:bg-slate-800">
<div class="w-full h-full opacity-80" data-alt="Stylized map showing cafe pins across Seoul city" data-location="Seoul, South Korea" style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuCAfN2iegLeV13ydfohA7B20AvmM5ThZ5EOmEDSJh-dtuhuLXx5ln746znWpRecCQYEEkD3ezQ2zozZ-l80GtzaAacYXOf5DcBMQ1DodLUQFVuvTloejTF2xs0KR2OncLOzKXh8Hya-hRLHNyzlmOCMmVFqwehBR93d56R34sBIg4qm8ftYmFybecDK2imW8sdFtSaJHxlGHh3ofUMHcAxn-fLZCFVU9L65I2AxGs_ssdo5o33WT47jts0rtL2zuqS-4G9qjSdxhGZE'); background-size: cover; background-position: center;">
<!-- Simulated Cafe Pins -->
<div class="absolute top-1/3 left-1/4 group cursor-pointer">
<div class="bg-primary text-white p-2 rounded-full shadow-lg border-2 border-white">
<span class="material-symbols-outlined block text-sm">coffee</span>
</div>
</div>
<div class="absolute top-1/2 left-1/2 group cursor-pointer">
<div class="bg-primary text-white p-2 rounded-full shadow-lg border-2 border-white scale-110">
<span class="material-symbols-outlined block text-sm">local_cafe</span>
</div>
</div>
<div class="absolute top-2/3 right-1/3 group cursor-pointer">
<div class="bg-primary text-white p-2 rounded-full shadow-lg border-2 border-white">
<span class="material-symbols-outlined block text-sm">bakery_dining</span>
</div>
</div>
</div>
</div>
<!-- Top Header & Search Area -->
<div class="relative z-10 px-4 pt-4">
<div class="flex flex-col gap-3">
<div class="flex items-center gap-3 bg-white/90 dark:bg-background-dark/90 backdrop-blur-md p-2 rounded-xl shadow-lg border border-primary/10">
<div class="flex-1 flex items-center px-3 gap-2">
<span class="material-symbols-outlined text-primary">search</span>
<input class="w-full bg-transparent border-none focus:ring-0 text-slate-900 dark:text-slate-100 placeholder:text-slate-400" placeholder="Search cafés / 搜尋咖啡廳" type="text"/>
</div>
<button class="bg-primary text-white p-2 rounded-lg flex items-center justify-center">
<span class="material-symbols-outlined">tune</span>
</button>
</div>
<!-- Horizontal Filter Bar -->
<div class="flex gap-2 overflow-x-auto pb-2 no-scrollbar">
<button class="flex items-center gap-1.5 whitespace-nowrap bg-primary text-white px-4 py-2 rounded-full shadow-sm text-sm font-medium">
<span class="material-symbols-outlined text-sm">laptop_mac</span>
                        Work / 工作
                    </button>
<button class="flex items-center gap-1.5 whitespace-nowrap bg-white dark:bg-slate-700 text-slate-700 dark:text-slate-200 px-4 py-2 rounded-full shadow-sm text-sm font-medium border border-primary/10">
<span class="material-symbols-outlined text-sm">favorite</span>
                        Date / 約會
                    </button>
<button class="flex items-center gap-1.5 whitespace-nowrap bg-white dark:bg-slate-700 text-slate-700 dark:text-slate-200 px-4 py-2 rounded-full shadow-sm text-sm font-medium border border-primary/10">
<span class="material-symbols-outlined text-sm">person</span>
                        Solo / 一人
                    </button>
<button class="flex items-center gap-1.5 whitespace-nowrap bg-white dark:bg-slate-700 text-slate-700 dark:text-slate-200 px-4 py-2 rounded-full shadow-sm text-sm font-medium border border-primary/10">
<span class="material-symbols-outlined text-sm">home</span>
                        Hanok / 韓屋
                    </button>
<button class="flex items-center gap-1.5 whitespace-nowrap bg-white dark:bg-slate-700 text-slate-700 dark:text-slate-200 px-4 py-2 rounded-full shadow-sm text-sm font-medium border border-primary/10">
<span class="material-symbols-outlined text-sm">apartment</span>
                        Rooftop / 頂樓
                    </button>
<button class="flex items-center gap-1.5 whitespace-nowrap bg-white dark:bg-slate-700 text-slate-700 dark:text-slate-200 px-4 py-2 rounded-full shadow-sm text-sm font-medium border border-primary/10">
<span class="material-symbols-outlined text-sm">potted_plant</span>
                        Plants / 植物
                    </button>
</div>
</div>
</div>
<!-- Floating Action Buttons (Map Controls) -->
<div class="absolute right-4 top-1/2 -translate-y-1/2 z-10 flex flex-col gap-2">
<button class="bg-white dark:bg-slate-800 p-3 rounded-full shadow-lg text-slate-600 dark:text-slate-300">
<span class="material-symbols-outlined">add</span>
</button>
<button class="bg-white dark:bg-slate-800 p-3 rounded-full shadow-lg text-slate-600 dark:text-slate-300">
<span class="material-symbols-outlined">remove</span>
</button>
<button class="bg-primary text-white p-3 rounded-full shadow-lg mt-2">
<span class="material-symbols-outlined">my_location</span>
</button>
</div>
<!-- Selected Cafe Preview Card -->
<div class="relative z-10 mt-auto px-4 pb-4">
<div class="bg-white dark:bg-background-dark rounded-xl shadow-2xl overflow-hidden border border-primary/10 flex flex-col md:flex-row">
<div class="h-32 md:h-auto md:w-32 flex-shrink-0 bg-primary/10" data-alt="Aesthetic warm cafe interior with wooden tables" style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuCjVJB8TTkhonoAPc_Pr53IOLl7noZ_SPiweyRTa9xUIRhEoFVymeMbOH-oXR1QOmm0pz2olpcD8PGlboeVkvGQScjPLxV-d8IVbnf_jW5ge4dseFMY8ildEb-_8P2z1eQIKVDo4TeqkEOgwUigT9djCQx3d0xFmDNACxsWSt3WUdTc9g_RUN-TJMF5iMA00jd6J1bXRjQH_qVub4N03ZCdX3lZmH1cOdoAc1CuEb6KXlF0zsbL6Ru_f0H-R8zLeEtSmXRSh9q9LXW3'); background-size: cover; background-position: center;"></div>
<div class="p-4 flex-1">
<div class="flex justify-between items-start mb-1">
<div>
<h3 class="text-lg font-bold text-slate-900 dark:text-slate-100">Sol-Hwa Hanok Café</h3>
<p class="text-sm text-slate-500 dark:text-slate-400">雪花韓屋咖啡廳</p>
</div>
<button class="text-primary">
<span class="material-symbols-outlined">bookmark</span>
</button>
</div>
<div class="flex gap-2 mb-3">
<span class="px-2 py-0.5 bg-primary/10 text-primary text-[10px] font-bold rounded uppercase tracking-wider">Hanok</span>
<span class="px-2 py-0.5 bg-primary/10 text-primary text-[10px] font-bold rounded uppercase tracking-wider">Signature Coffee</span>
</div>
<div class="flex items-center justify-between text-xs font-medium text-slate-400">
<div class="flex items-center gap-1">
<span class="material-symbols-outlined text-sm">group</span>
<span>12 visitors today</span>
</div>
<div class="flex items-center gap-1 text-primary">
<span class="material-symbols-outlined text-sm">star</span>
<span>4.8 (120 reviews)</span>
</div>
</div>
</div>
</div>
</div>
<!-- Bottom Navigation Bar -->
<div class="relative z-20 flex gap-2 border-t border-slate-200 dark:border-slate-800 bg-white/95 dark:bg-background-dark/95 backdrop-blur-lg px-4 pb-6 pt-2">
<a class="flex flex-1 flex-col items-center justify-center gap-1 text-slate-400 dark:text-slate-500" href="#">
<span class="material-symbols-outlined text-[24px]">rss_feed</span>
<p class="text-[10px] font-medium leading-normal">Feed / 動態</p>
</a>
<a class="flex flex-1 flex-col items-center justify-center gap-1 text-primary" href="#">
<span class="material-symbols-outlined text-[24px]">map</span>
<p class="text-[10px] font-semibold leading-normal">Map / 地圖</p>
</a>
<a class="flex flex-1 flex-col items-center justify-center gap-1" href="#">
<div class="bg-primary text-white p-3 rounded-full -mt-8 shadow-lg shadow-primary/30 border-4 border-white dark:border-background-dark">
<span class="material-symbols-outlined text-[28px]">add</span>
</div>
<p class="text-[10px] font-medium leading-normal text-slate-400">Record / 記錄</p>
</a>
<a class="flex flex-1 flex-col items-center justify-center gap-1 text-slate-400 dark:text-slate-500" href="#">
<span class="material-symbols-outlined text-[24px]">calendar_today</span>
<p class="text-[10px] font-medium leading-normal">Log / 日曆</p>
</a>
<a class="flex flex-1 flex-col items-center justify-center gap-1 text-slate-400 dark:text-slate-500" href="#">
<span class="material-symbols-outlined text-[24px]">person</span>
<p class="text-[10px] font-medium leading-normal">My / 我的</p>
</a>
</div>
</div>
<style>
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
</body></html>
